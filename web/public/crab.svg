<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges" style="image-rendering:pixelated">
  <!-- pixel-art crab, 32x32 grid, palette mostly red/black -->
  <rect width="32" height="32" fill="#0a0d18"/>
  <!-- shell -->
  <rect x="8" y="10" width="16" height="8" fill="#d63b3b"/>
  <rect x="6" y="12" width="2" height="4" fill="#d63b3b"/>
  <rect x="24" y="12" width="2" height="4" fill="#d63b3b"/>
  <rect x="10" y="8" width="12" height="2" fill="#d63b3b"/>
  <!-- highlights -->
  <rect x="10" y="10" width="2" height="2" fill="#f56565"/>
  <rect x="20" y="10" width="2" height="2" fill="#f56565"/>
  <!-- eyes -->
  <rect x="12" y="12" width="2" height="2" fill="#fff"/>
  <rect x="18" y="12" width="2" height="2" fill="#fff"/>
  <rect x="13" y="13" width="1" height="1" fill="#0a0d18"/>
  <rect x="19" y="13" width="1" height="1" fill="#0a0d18"/>
  <!-- mouth -->
  <rect x="13" y="16" width="6" height="1" fill="#0a0d18"/>
  <!-- claws -->
  <rect x="2" y="14" width="4" height="2" fill="#d63b3b"/>
  <rect x="26" y="14" width="4" height="2" fill="#d63b3b"/>
  <rect x="0" y="12" width="2" height="2" fill="#d63b3b"/>
  <rect x="30" y="12" width="2" height="2" fill="#d63b3b"/>
  <rect x="0" y="16" width="2" height="2" fill="#d63b3b"/>
  <rect x="30" y="16" width="2" height="2" fill="#d63b3b"/>
  <!-- legs -->
  <rect x="8" y="18" width="2" height="2" fill="#d63b3b"/>
  <rect x="12" y="18" width="2" height="2" fill="#d63b3b"/>
  <rect x="18" y="18" width="2" height="2" fill="#d63b3b"/>
  <rect x="22" y="18" width="2" height="2" fill="#d63b3b"/>
  <rect x="7" y="20" width="2" height="2" fill="#a02b2b"/>
  <rect x="11" y="20" width="2" height="2" fill="#a02b2b"/>
  <rect x="19" y="20" width="2" height="2" fill="#a02b2b"/>
  <rect x="23" y="20" width="2" height="2" fill="#a02b2b"/>
</svg>
